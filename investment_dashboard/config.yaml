# ================================================================
#  打出の小槌 - 投資情報ダッシュボード 設定ファイル
# ================================================================

# ── Ollama ────────────────────────────────────────────────────
ollama:
  host: "http://localhost:11434"
  model: "llama3:8b"
  keep_alive: 0
  timeout: 180

# ── 監視銘柄リスト（自由に追加・削除してください） ───────────
watchlist:
  stocks:
    - ticker: "7203.T"
      name: "トヨタ自動車"
    - ticker: "9984.T"
      name: "ソフトバンクG"
    - ticker: "6758.T"
      name: "ソニーG"
    - ticker: "8306.T"
      name: "三菱UFJ"
    - ticker: "4063.T"
      name: "信越化学"

# ── 金融ニュース RSS フィード ─────────────────────────────────
news_feeds:
  - "https://news.yahoo.co.jp/rss/topics/stock.xml"
  - "https://news.yahoo.co.jp/rss/topics/economy.xml"
  - "https://jp.reuters.com/rssFeed/businessNews"

# ── データ収集設定 ────────────────────────────────────────────
collector:
  interval_seconds: 900       # 15分ごとに収集
  max_news_per_feed: 10
  min_sentiment_score: 40     # これ以上のスコアのみDB保存

# ── アラート設定 ─────────────────────────────────────────────
alerts:
  price_change_threshold: 3.0   # ±3%以上の価格変動でアラート
  sentiment_score_threshold: 75 # スコア75以上のニュースでアラート

# ── Flask ダッシュボード ──────────────────────────────────────
dashboard:
  host: "127.0.0.1"
  port: 5001
  debug: true

# ── データベース ──────────────────────────────────────────────
database:
  path: "output/investment.db"
